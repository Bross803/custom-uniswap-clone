<!DOCTYPE html>
<html>
<head><title>Custom DEX Clone</title>
<style>body {font-family: Arial; text-align: center; padding: 50px; background: #f8f9fa;} button {padding: 15px 30px; margin: 10px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer;} button:hover {background: #0056b3;} .btc {background: #f7931a; color: white;} .wallet {font-family: monospace; background: #fff; padding: 10px; border: 1px solid #ddd; margin: 10px auto; max-width: 400px;}</style>
</head>
<body>
<h1>Your Custom Uniswap DEX Clone</h1>
<p>Connect wallet for demo swaps. Send BTC tips to support.</p>

<button id="connect">Connect MetaMask (Demo)</button>
<div id="status"></div>

<div class="wallet">
  <strong>Send BTC Tips Here:</strong><br>
  <span id="btc-address">bc1qr098y8p975xth6pfp8ymcmfy3vtucsaym0nwh8</span>
</div>
<button id="copy-btc" class="btc">Copy BTC Address</button>
<button id="send-eth">Send 0.01 ETH Tip (Demo)</button>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
const connectBtn = document.getElementById('connect');
const status = document.getElementById('status');
const sendEthBtn = document.getElementById('send-eth');
const copyBtcBtn = document.getElementById('copy-btc');
let provider, signer, userAddress;

const btcAddress = 'bc1qr098y8p975xth6pfp8ymcmfy3vtucsaym0nwh8';

connectBtn.onclick = async () => {
  if (window.ethereum) {
    provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();
    userAddress = await signer.getAddress();
    status.innerHTML = `Connected: ${userAddress.substring(0,6)}...`;
  } else alert("Install MetaMask");
};

copyBtcBtn.onclick = () => {
  navigator.clipboard.writeText(btcAddress).then(() => {
    status.innerHTML = 'BTC address copied! Send to: ' + btcAddress;
  });
};

sendEthBtn.onclick = async () => {
  if (!signer) return alert("Connect MetaMask first");
  try {
    const tx = await signer.sendTransaction({
      to: "0xYourETHAddressHere", // Add your ETH address if wanted
      value: ethers.utils.parseEther("0.01")
    });
    status.innerHTML += `<br>ETH TX sent: ${tx.hash}`;
  } catch(e) { status.innerHTML = "Error: " + e.message; }
};
</script>
</body>
</html>
